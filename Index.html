<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Football Creator Hub</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; height: 90vh; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; }
        
        /* Tactics Board */
        #pitch { background: #2e7d32; flex-grow: 1; border: 3px solid white; position: relative; border-radius: 8px; }
        .player { 
            width: 35px; height: 35px; background: white; color: black; border-radius: 50%; 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: grab; border: 2px solid #000;
        }

        /* Editor */
        textarea { width: 100%; flex-grow: 1; background: #252525; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; }
        
        /* Python Output Area */
        #python-console { background: #000; color: #00ff00; padding: 10px; border-radius: 5px; font-family: monospace; margin-top: 10px; height: 100px; overflow-y: auto; }
        
        button { background: #4caf50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <h3>Football Tactics Board</h3>
        <div id="pitch">
            <div class="player" id="p1" data-x="20" data-y="20">ST</div>
            <div class="player" id="p2" data-x="150" data-y="150">CM</div>
        </div>
        <p>Drag players to set formation.</p>
    </div>

    <div class="card">
        <h3>Creator Hub & Python Logic</h3>
        <textarea id="script-input" placeholder="Type your script here..."></textarea>
        
        <button id="run-python-btn" py-click="process_data">Run Python Analysis</button>
        
        <div id="python-console">
            Python Status: Ready...
        </div>
    </div>
</div>

<script type="py">
from pyscript import display, document

def process_data(event):
    # Get text from the HTML textarea
    user_text = document.querySelector("#script-input").value
    
    # Python logic: Count words and analyze script
    word_count = len(user_text.split())
    
    # Update the console area
    output = document.querySelector("#python-console")
    output.innerText = f"Python Analysis:\n- Words: {word_count}\n- Status: Script Processed successfully!"
</script>

<script>
    // JavaScript for Draggable Interaction
    interact('.player').draggable({
        listeners: {
            move (event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }
        }
    });
</script>

</body>
</html>
